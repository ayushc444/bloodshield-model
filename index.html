
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0c0c10; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
#root { width: 100%; background: #0c0c10; display: grid; grid-template-rows: 72px 1fr 64px; overflow: hidden; }

#topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; border-bottom: 0.5px solid rgba(255,255,255,0.07); }
#top-left { display: flex; align-items: center; gap: 16px; }
#ttitle { font-size: 36px; font-weight: 700; color: #ffffff; letter-spacing: -0.03em; line-height: 1; }
#tbadge { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #b0abf0; background: rgba(127,119,221,0.14); border: 0.5px solid rgba(127,119,221,0.28); border-radius: 20px; padding: 4px 12px; white-space: nowrap; }

#mid { display: grid; grid-template-columns: 1fr 260px; }
#canvaswrap { position: relative; }
canvas { display: block; width: 100%; }
#draghint { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); font-size: 11px; color: rgba(255,255,255,0.18); letter-spacing: 0.05em; pointer-events: none; white-space: nowrap; }

#sidebar { border-left: 0.5px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; padding: 20px 18px; gap: 4px; }
#slabel { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 8px; padding-left: 4px; }

.cbtn { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px; border: 0.5px solid transparent; cursor: pointer; background: transparent; text-align: left; width: 100%; transition: background 0.12s, border-color 0.12s; }
.cbtn:hover { background: rgba(255,255,255,0.05); }
.cbtn.active { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); }
.cdot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.cname { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.92); display: block; line-height: 1.3; }
.csub { font-size: 11px; color: rgba(255,255,255,0.38); display: block; margin-top: 3px; }

#div { height: 0.5px; background: rgba(255,255,255,0.06); margin: 12px 0; }

#infopanel { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 4px; }
#iname { font-size: 14px; font-weight: 600; color: #ffffff; line-height: 1.4; }
#ibody { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 8px; line-height: 1.65; }

#bottombar { display: flex; align-items: center; gap: 10px; padding: 0 24px; border-top: 0.5px solid rgba(255,255,255,0.06); }
#mlabel { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.22); margin-right: 2px; white-space: nowrap; }

.sbtn { flex: 1; padding: 0 14px; height: 40px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.11); cursor: pointer; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.04); transition: all 0.15s; white-space: nowrap; font-family: inherit; letter-spacing: 0.01em; display: flex; align-items: center; justify-content: center; gap: 8px; }
.sbtn:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.9); border-color: rgba(255,255,255,0.22); }
.sbtn.active { background: rgba(127,119,221,0.22); color: #d4d0ff; border-color: rgba(160,154,238,0.55); }
.snum { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 700; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); flex-shrink: 0; transition: all 0.15s; }
.sbtn:hover .snum { background: rgba(255,255,255,0.15); color: #fff; }
.sbtn.active .snum { background: rgba(160,154,238,0.4); color: #fff; }
#rstbtn { padding: 0 16px; height: 40px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.07); cursor: pointer; font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.28); background: transparent; transition: all 0.13s; font-family: inherit; white-space: nowrap; }
#rstbtn:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.14); }
</style>

<div id="root">
  <div id="topbar">
    <div id="top-left">
      <span id="ttitle">BloodShield EV</span>
    </div>
    <span id="tbadge">McMaster iGEM &times; Shad</span>
  </div>

  <div id="mid">
    <div id="canvaswrap">
      <canvas id="c"></canvas>
      <div id="draghint">drag to rotate &middot; resumes spinning when idle</div>
    </div>
    <div id="sidebar">
      <div id="slabel">Components</div>
      <button class="cbtn active" id="btn-all" onclick="ft('all',this)">
        <div class="cdot" style="background:#7F77DD"></div>
        <div><span class="cname">Full structure</span><span class="csub">All surface components</span></div>
      </button>
      <button class="cbtn" onclick="ft('scaffold',this)">
        <div class="cdot" style="background:#1D9E75"></div>
        <div><span class="cname">Lamp2b / CD63</span><span class="csub">Membrane scaffold protein</span></div>
      </button>
      <button class="cbtn" onclick="ft('scfv',this)">
        <div class="cdot" style="background:#378ADD"></div>
        <div><span class="cname">scFv targeting arms</span><span class="csub">Malaria &middot; HepB &middot; Flavivirus</span></div>
      </button>
      <button class="cbtn" onclick="ft('photo',this)">
        <div class="cdot" style="background:#EF9F27"></div>
        <div><span class="cname">Photosensitizer</span><span class="csub">Chlorin e6 analogue</span></div>
      </button>
      <button class="cbtn" onclick="ft('spion',this)">
        <div class="cdot" style="background:#E24B4A"></div>
        <div><span class="cname">SPION tags</span><span class="csub">Magnetic removal</span></div>
      </button>
      <div id="div"></div>
      <div id="infopanel">
        <div id="iname">Hover a component</div>
        <div id="ibody">Click any surface feature on the EV to read its role in the BloodShield mechanism.</div>
      </div>
    </div>
  </div>

  <div id="bottombar">
    <span id="mlabel">Mechanism</span>
    <button class="sbtn" onclick="ss(0,this)"><span class="snum">1</span>Target capture</button>
    <button class="sbtn" onclick="ss(1,this)"><span class="snum">2</span>Inactivation</button>
    <button class="sbtn" onclick="ss(2,this)"><span class="snum">3</span>Removal</button>
    <button id="rstbtn" onclick="rv()">Reset</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const cv=document.getElementById('c');
const cw=document.getElementById('canvaswrap');

function resize(){
  const root=document.getElementById('root');
  const topH=72,botH=64;
  const H=Math.max(400, window.innerHeight - topH - botH - 20);
  const W=cw.clientWidth;
  root.style.height=(topH+H+botH)+'px';
  cv.width=W*devicePixelRatio; cv.height=H*devicePixelRatio;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  if(renderer){ renderer.setSize(W,H); camera.aspect=W/H; camera.updateProjectionMatrix(); }
  return {W,H};
}

let renderer,camera;
const {W,H}=resize();

renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:false});
renderer.setSize(W,H); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x0c0c10,1);

const scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera(36,W/H,0.1,100);
camera.position.set(0,0,6.0);

scene.add(new THREE.AmbientLight(0xffffff,0.35));
const d1=new THREE.DirectionalLight(0xffffff,1.0);d1.position.set(4,6,5);scene.add(d1);
const d2=new THREE.DirectionalLight(0x7766ff,0.4);d2.position.set(-4,-2,-4);scene.add(d2);
const d3=new THREE.DirectionalLight(0x6644cc,0.5);d3.position.set(-2,4,-3);scene.add(d3);
const d4=new THREE.DirectionalLight(0xffffff,0.2);d4.position.set(0,0,-5);scene.add(d4);

const OP=0.88;
const evMat=new THREE.MeshPhongMaterial({color:0x6e55cc,transparent:true,opacity:OP,side:THREE.DoubleSide,shininess:120,specular:0xaa99ff});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.35,64,64),evMat));
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.32,32,32),new THREE.MeshPhongMaterial({color:0x9988ee,transparent:true,opacity:0.28,side:THREE.BackSide,shininess:30})));

const groups={scaffold:[],scfv:[],photo:[],spion:[]};
const allObjs=[];
const sMat=new THREE.MeshPhongMaterial({color:0x1D9E75,shininess:120,specular:0x5DCAA5});
const fMat=new THREE.MeshPhongMaterial({color:0x378ADD,shininess:130,specular:0x85B7EB});
const pMat=new THREE.MeshPhongMaterial({color:0xEF9F27,shininess:140,specular:0xFAC775});
const xMat=new THREE.MeshPhongMaterial({color:0xE24B4A,shininess:150,specular:0xF09595});
const bm={scaffold:sMat,scfv:fMat,photo:pMat,spion:xMat};
const fl=['Malaria (PfEMP1 target)','Hepatitis B (HBsAg target)','Flavivirus (E-protein target)'];

const R=1.36;
function fib(n,r){const p=[],g=Math.PI*(3-Math.sqrt(5));for(let i=0;i<n;i++){const y=1-(i/(n-1))*2,rd=Math.sqrt(Math.max(0,1-y*y));p.push(new THREE.Vector3(r*rd*Math.cos(g*i),r*y,r*rd*Math.sin(g*i)));}return p;}
function ad(a,b){return Math.acos(Math.min(1,a.clone().normalize().dot(b.clone().normalize())));}
function gs(pool,ex,count){const ch=[],p=[...pool];for(let c=0;c<count;c++){let bi=0,bd=-1;for(let i=0;i<p.length;i++){let md=Infinity;for(const e of[...ex,...ch]){const d=ad(p[i],e);if(d<md)md=d;}if(md>bd){bd=md;bi=i;}}ch.push(p[bi]);p.splice(bi,1);}return ch;}

const POOL=fib(300,R);
const cSc=gs(POOL,[],28);
const cFv=gs(POOL,cSc,12);
const cPh=gs(POOL,[...cSc,...cFv],14);
const cSp=gs(POOL,[...cSc,...cFv,...cPh],10);

cSc.forEach(pos=>{const m=new THREE.Mesh(new THREE.SphereGeometry(0.048,10,10),sMat);m.position.copy(pos);m.userData={type:'scaffold',label:'Lamp2b / CD63 scaffold',desc:'Membrane-anchoring protein that displays targeting ligands on the EV surface. Enables modular attachment of scFv arms.'};scene.add(m);groups.scaffold.push(m);allObjs.push(m);});
cFv.forEach((pos,i)=>{const g=new THREE.Group();g.position.copy(pos);g.lookAt(pos.clone().multiplyScalar(3));const st=new THREE.Mesh(new THREE.CylinderGeometry(0.016,0.016,0.2,8),fMat);st.rotation.x=Math.PI/2;st.position.z=0.1;g.add(st);[-0.055,0.055].forEach(dx=>{const a=new THREE.Mesh(new THREE.CylinderGeometry(0.013,0.013,0.13,8),fMat);a.rotation.x=Math.PI/2;a.rotation.z=dx*2.8;a.position.set(dx*1.1,0,0.25);g.add(a);const t=new THREE.Mesh(new THREE.SphereGeometry(0.028,8,8),fMat);t.position.set(dx*1.6,0,0.32);g.add(t);});g.userData={type:'scfv',label:'scFv targeting arm',desc:fl[i%3]};g.traverse(c=>{if(c!==g)c.userData=g.userData;});scene.add(g);groups.scfv.push(g);allObjs.push(g);});
cPh.forEach(pos=>{const m=new THREE.Mesh(new THREE.TorusGeometry(0.052,0.016,10,20),pMat);m.position.copy(pos);m.lookAt(pos.clone().multiplyScalar(3));m.userData={type:'photo',label:'Photosensitizer (chlorin e6)',desc:'Membrane-embedded dye activated by light. Generates singlet oxygen for spatially confined pathogen inactivation at the EV-target interface.'};scene.add(m);groups.photo.push(m);allObjs.push(m);});
cSp.forEach(pos=>{const g=new THREE.Group();g.position.copy(pos);[[-0.038,-0.038,0],[0.038,-0.038,0],[0,0.04,0],[0,0,0.048],[-0.02,0.02,0.035],[0.02,0.02,0.035]].forEach(([x,y,z])=>{const s=new THREE.Mesh(new THREE.SphereGeometry(0.033,8,8),xMat);s.position.set(x,y,z);g.add(s);});g.userData={type:'spion',label:'SPION tag',desc:'Superparamagnetic iron oxide nanoparticle cluster. Enables magnetic separation to pull EV-pathogen complexes from the blood unit before final release.'};g.traverse(c=>{if(c!==g)c.userData=g.userData;});scene.add(g);groups.spion.push(g);allObjs.push(g);});

const sc={
  0:{show:['scaffold','scfv'],label:'Step 1 \u2014 Target capture',desc:'scFv arms bind pathogen-specific surface antigens (PfEMP1, HBsAg, viral E-protein). Lamp2b/CD63 scaffold anchors targeting ligands to the EV membrane.'},
  1:{show:['photo'],label:'Step 2 \u2014 Local inactivation',desc:'Light activates the chlorin e6 photosensitizer. Singlet oxygen is generated at the EV-pathogen interface for spatially confined pathogen inactivation.'},
  2:{show:['spion'],label:'Step 3 \u2014 Magnetic removal',desc:'SPION tags enable magnetic separation. EV-pathogen complexes are physically extracted from the blood unit before final product release.'}
};

function si(n,b){document.getElementById('iname').textContent=n;document.getElementById('ibody').textContent=b;}
function rbm(){groups.scaffold.forEach(m=>{m.material=sMat;});groups.scfv.forEach(g=>g.traverse(c=>{if(c.isMesh)c.material=fMat;}));groups.photo.forEach(m=>{m.material=pMat;});groups.spion.forEach(g=>g.traverse(c=>{if(c.isMesh)c.material=xMat;}));}

function ft(type,btn){document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');document.querySelectorAll('.sbtn').forEach(s=>s.classList.remove('active'));rbm();const all=type==='all';evMat.opacity=all?OP:0.42;Object.entries(groups).forEach(([k,arr])=>arr.forEach(m=>{m.visible=all||k===type;}));if(all)si('Hover a component','Click any surface feature on the EV to read its role in the BloodShield mechanism.');}
window.ft=ft;
function ss(n,btn){document.querySelectorAll('.sbtn').forEach(s=>s.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));document.getElementById('btn-all').classList.add('active');const cfg=sc[n];evMat.opacity=0.52;Object.entries(groups).forEach(([k,arr])=>{const show=cfg.show.includes(k);arr.forEach(obj=>{obj.visible=true;obj.traverse(c=>{if(c.isMesh&&c.material){const m=bm[k]?bm[k].clone():c.material.clone();m.transparent=true;m.opacity=show?1:0.06;c.material=m;}});});});si(cfg.label,cfg.desc);}
window.ss=ss;
function rv(){document.querySelectorAll('.sbtn').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));document.getElementById('btn-all').classList.add('active');evMat.opacity=OP;rbm();Object.values(groups).forEach(arr=>arr.forEach(m=>{m.visible=true;}));si('Hover a component','Click any surface feature on the EV to read its role in the BloodShield mechanism.');}
window.rv=rv;

let drag=false,prev={x:0,y:0},autoRot=true,idleTimer=null;
function startIdle(){clearTimeout(idleTimer);idleTimer=setTimeout(()=>{autoRot=true;},2500);}
cv.addEventListener('mousedown',e=>{drag=true;autoRot=false;clearTimeout(idleTimer);prev={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>{if(drag){drag=false;startIdle();}});
cv.addEventListener('mousemove',e=>{
  if(drag){
    const curW=cv.clientWidth,curH=cv.clientHeight;
    scene.rotation.y+=(e.clientX-prev.x)*0.007;scene.rotation.x+=(e.clientY-prev.y)*0.007;prev={x:e.clientX,y:e.clientY};
  }
  const rect=cv.getBoundingClientRect();
  const curW=cv.clientWidth,curH=cv.clientHeight;
  const mx=((e.clientX-rect.left)/curW)*2-1,my=-((e.clientY-rect.top)/curH)*2+1;
  const ray=new THREE.Raycaster();ray.setFromCamera({x:mx,y:my},camera);
  const ms=[];allObjs.forEach(o=>{if(o.isMesh)ms.push(o);else o.traverse(c=>{if(c.isMesh)ms.push(c);});});
  const hits=ray.intersectObjects(ms);
  if(hits.length&&hits[0].object.userData.label){const d=hits[0].object.userData;si(d.label,d.desc);cv.style.cursor='pointer';}
  else{cv.style.cursor='default';}
});

let t=0;
(function animate(){requestAnimationFrame(animate);t+=0.008;if(autoRot)scene.rotation.y+=0.003;groups.photo.forEach((m,i)=>{m.rotation.z=t*0.6+i*0.45;});renderer.render(scene,camera);})();
</script>
